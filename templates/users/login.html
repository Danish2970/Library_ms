{% extends 'base.html' %}
{% block auth_content %}
<div class="min-h-screen bg-indigo-50 flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-200 w-full max-w-md p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-semibold text-indigo-900">📚 Library MS</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
    </div>

    {% if form.errors %}
    <div class="bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3 mb-4">
      Invalid username or password.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" name="username" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            placeholder="Enter your username">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
            placeholder="Enter your password">
        </div>
        <button type="submit"
          class="w-full bg-indigo-700 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-800 transition">
          Sign In
        </button>
      </div>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      Don't have an account? <a href="{% url 'users:register' %}" class="text-indigo-600 hover:underline">Register</a>
    </p>
  </div>
</div>
{% endblock %}
